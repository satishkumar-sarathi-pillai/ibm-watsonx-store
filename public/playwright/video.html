<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playwright E2E Video</title>
    <style>
      body { margin:0; font-family:Arial,sans-serif; background:#111; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
      .card { width:min(95vw, 960px); padding:24px; border-radius:12px; background:#1f2937; box-shadow:0 10px 30px rgba(0,0,0,0.35); }
      video { width:100%; border-radius:8px; background:#000; }
      a { color:#7dd3fc; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Playwright E2E Video</h2>
      <p>The converted MP4 recording is available below. It should play more consistently in modern browsers.</p>
      <video controls autoplay muted playsinline width="100%">
        <source src="./video.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <p><a href="./video.mp4" target="_blank" style="display:inline-block;padding:10px 14px;background:#2563eb;border-radius:6px;color:#fff;text-decoration:none;">Open MP4 video</a></p>
      <p><a href="./video.mp4" download>Download MP4</a></p>
    </div>
  </body>
</html>
